<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senha alterada</title>
</head>
<body style="margin:0;padding:0;background-color:#f8f9fa;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="100%" style="max-width:480px;background:#ffffff;border-radius:8px;padding:32px;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <span style="font-size:40px;" role="img" aria-hidden="true">🎓</span>
              <h1 style="margin:8px 0 0;font-size:20px;color:#212529;">Busca Ativa Escolar</h1>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom:24px;">
              <h2 style="font-size:18px;color:#212529;margin:0 0 12px;">Sua senha foi alterada</h2>
              <p style="font-size:15px;color:#495057;line-height:1.5;margin:0;">
                A senha da sua conta foi alterada com sucesso.
              </p>
              <p style="font-size:15px;color:#495057;line-height:1.5;margin:16px 0 0;">
                Se você não realizou esta alteração, redefina sua senha imediatamente e
                entre em contato com a gestão escolar.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding-top:16px;border-top:1px solid #dee2e6;">
              <p style="font-size:12px;color:#868e96;margin:0;text-align:center;">
                Este é um e-mail automático. Não responda a esta mensagem.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
